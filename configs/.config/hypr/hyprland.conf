
################
### PROGRAMS ###
################

# Set programs that you use
$notifications = 
$quickSearch = /usr/bin/anyrun
$fileManager = /usr/bin/nautilus
$terminal = /usr/bin/alacritty

#################
### AUTOSTART ###
#################

exec-once = hyprpaper
exec-once = waybar

################
### MONITORS ###
################

monitor = eDP-1, 1920x1080@60, 0x0, 1, transform, 0

#####################
### LOOK AND FEEL ###
#####################

env = XCURSOR_SIZE,0
env = XCURSOR_THEME,

general {
	gaps_in = 6
	gaps_out = 10
	border_size = 2
	col.active_border = rgb(26,95,180)
	col.inactive_border = rgb(98,160,234)
	resize_on_border = true
	allow_tearing = false
	layout = dwindle
}

decoration {
	rounding = 8
	rounding_power = 2
	dim_inactive = false
	active_opacity = 1
	inactive_opacity = 6
	
	shadow {
		enabled = true
		range = 8
		render_power = 2
		color = rgb(36,31,49)
	}
	
	blur {
		enabled = true
		size = 2
		passes = 1
		vibrancy = 2
	}
}

dwindle {
	pseudotile = true
	preserve_split = true
}

master {
	new_status = master
}

misc {
	force_default_wallpaper = false
	disable_hyprland_logo = false
}

#############
### INPUT ###
#############


input {
	kb_layout = de
	numlock_by_default = false
	repeat_rate = 25
	repeat_delay = 600
	sensitivity = 0
	left_handed = false
	scroll_factor = 0
	natural_scroll = false
}

###################
### KEYBINDINGS ###
###################

bind = SUPER, Q, exec, $terminal
bind = SUPER, E, exec, $fileManager
bind = SUPER, R, exec, $quickSearch
bind = SUPER, L, exec, hyprlock

bind = SUPER, C, killactive
bind = SUPER, M, exit
bind = SUPER, V, togglefloating
bind = SUPER, H, pseudo
bind = SUPER, J, togglesplit
bind = SUPER, LEFT, movefocus, l
bind = SUPER, RIGHT, movefocus, r
bind = SUPER, UP, movefocus, u
bind = SUPER, DOWN, movefocus, d

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 0

bind = SHIFT SUPER, 1, movetoworkspace, 1
bind = SHIFT SUPER, 2, movetoworkspace, 2
bind = SHIFT SUPER, 3, movetoworkspace, 3
bind = SHIFT SUPER, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER, 6, movetoworkspace, 6
bind = SHIFT SUPER, 7, movetoworkspace, 7
bind = SHIFT SUPER, 8, movetoworkspace, 8
bind = SHIFT SUPER, 9, movetoworkspace, 9
bind = SHIFT SUPER, 0, movetoworkspace, 0
