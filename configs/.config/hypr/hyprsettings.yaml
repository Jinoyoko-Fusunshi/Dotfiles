program_settings:
  programs:
    VirtualTerminal: /usr/bin/alacritty
    FileManager: /usr/bin/nautilus
    QuickSearch: /usr/bin/anyrun
    hyprpaper: hyprpaper
  startup_programs:
    hyprpaper: hyprpaper
display_settings:
  monitor_configurations:
    eDP-1:
      enabled: true
      information:
        port_name: eDP-1
        brand_name: BOE
        model_name: '0x0812'
        serial_number: ''
        min_video_mode:
          refresh_rate: 60
          width_resolution: 640
          height_resolution: 480
        max_video_mode:
          refresh_rate: 60
          width_resolution: 1920
          height_resolution: 1080
      video_mode:
        refresh_rate: 60
        width_resolution: 1920
        height_resolution: 1080
      x_offset: 0
      y_offset: 0
      resolution_scale: 1.0
      orientation: None
appearance_settings:
  wallpaper_path: ~/OneDrive/Pictures/Wallpapers/himeno.jpg
  cursor_size: 0
  cursor_theme: ''
  force_default_wallpaper: false
  disable_hyprland_logo: false
  inner_gab: 6.0
  outer_gab: 10.0
  border_size: 2.0
  active_border_color: rgb(26,95,180)
  inactive_border_color: rgb(98,160,234)
  resize_on_border: true
  allow_tearing: false
  rounding: 8.0
  rounding_power: 2.0
  dim_inactive: false
  active_opacity: 1.0
  inactive_opacity: 6.0
  active_shadow: true
  shadow_range: 8.0
  shadow_render_power: 2.0
  shadow_color: rgb(36,31,49)
  active_blur: true
  blur_size: 2.0
  blur_passes: 1
  blur_vibrancy: 2.0
  layout: dwindle
  master_status: master
  pseudo_tiling: true
  split_preservation: true
input_settings:
  keyboard_layout: de
  numlock_enabled: false
  keyboard_repeat_rate: 25
  keyboard_repeat_delay: 600
  mouse_sensitivity: 0.0
  mouse_left_handed: false
  mouse_scroll_factor: 0.0
  mouse_natural_scroll: false
keybind_settings:
  program_keybinds:
    SwitchWorkspaceOne:
      modifier_keys:
      - SUPER
      key: '1'
