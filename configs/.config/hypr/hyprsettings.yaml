lockscreen_settings:
  hide_cursor: false
  grace: 0.0
  fall_timeout: 0
  lockscreen_wallpaper: ~/OneDrive/Pictures/Wallpapers/himeno.jpg
  blur_size: 0
  blur_passes: 0
  noise: 0.0
  contrast: 0.0
  brightness: 0.0
  vibrancy: 0.0
  input_width: 0
  input_height: 0
  input_outline_thickness: 0
  input_dots_size: 0
  input_dots_spacing: 0
  input_dots_center: false
  input_outer_color: rgba(0,0,0,0)
  input_inner_color: rgba(0,0,0,0)
  input_font_color: rgba(0,0,0,0)
  input_placeholder_text: ''
  hide_input: false
  input_x_position: 0
  input_y_position: 0
  input_vertical_alignment: ''
  input_horizontal_alignment: ''
  display_text: ''
